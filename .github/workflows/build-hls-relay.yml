name: Build & Push HLS Relay Image

on:
  push:
    branches: [master]
    paths:
      - agent/hls_relay.Dockerfile
      - agent/hls_relay.sh

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  AWS_REGION:   us-east-1
  ECR_REPO:     watchtell-hls-relay
  AWS_ACCOUNT:  916918686359

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE_URI=${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          cd agent
          docker build -f hls_relay.Dockerfile -t $IMAGE_URI:latest .
          docker push $IMAGE_URI:latest
          echo "Pushed $IMAGE_URI:latest"

      - name: Force ECS service redeployment
        run: |
          aws ecs update-service \
            --cluster watchtell \
            --service watchtell-hls-relay \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
